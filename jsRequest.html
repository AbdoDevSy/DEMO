<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background-color: aqua;
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
    }

    #content {
        background-color: rgb(188, 219, 219);
        width: 70%;
        max-width: 1200px;
        border-radius: 5px;
        box-sizing: border-box;
        /* margin: auto auto auto 50%; */
    }

    #listView {
        /* background-color: rgb(44, 31, 16); */
        width: 30%;
        border-radius: 5px;
        box-sizing: border-box;

    }


    .menu-list {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .menu-list li {
        background-color: #fff3e0;
        padding: 12px;
        margin-bottom: 12px;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.3s, transform 0.1s;
        text-align: center;
        font-weight: bold;
        border: 1px solid #b97f44;
    }

    .menu-list li:hover {
        background-color: #ffd8a8;
        transform: scale(1.02);
    }

    .menu-list li:active {
        transform: scale(0.98);
    }

    p {
        background-color: #f0f0f0;
        padding: 10px;
        border-radius: 5px;
        margin: 0px 0px 20px 0px;
        word-wrap: break-word;
    }

    .div-name {
        font-weight: bold;
        font-size: large;
    }

    @media (max-width: 600px) {

        #listView,
        #content {
            width: 100%;
        }
    }
</style>

    <ul class="menu-list">
    </ul>

    getUsersUsingAxios()
    .then((value) => {
        getUserPostsWithAxios(1);
    }).catch((error) => {
        console.error("Error in fetching users:", error);
    })
    


    function getUsersUsingAxios() {

        return new Promise((resolve, reject) => {
            axios.get('https://jsonplaceholder.typicode.com/users')
                .then(response => {
                    let users = response.data;
                    for (let user of users) {
                        document.querySelector(".menu-list").innerHTML += `<li onclick="getUserPostsWithAxios(${user.id})"><div class="div-name">${user.name}</div><div>${user.email}</div></li>`;
                        console.log(user.name);
                        console.log(user.email);
                    }
                    resolve();
                })
                .catch(error => {
                    console.error("Error fetching data:", error);
                    reject(error);
                });
        });


    }


    function getUserPostsWithAxios(userId) {
        axios.get(`https://jsonplaceholder.typicode.com/users/${userId}/posts`)
            .then(response => {
                const posts = response.data;
                let content = document.getElementById("content");
                content.innerHTML = "";
                console.log("posts:", posts);
                for (post of posts) {
                    content.innerHTML += `<p>${post.title}<br>${post.body}</p>`;
                }
            })
            .catch(error => {
                console.error("Error fetching data", error);
                document.getElementById("content").innerHTML += "<p>❌ فشل في جلب المنشورات.</p>";
            });
    }

    function readPosts() {
        let request = new XMLHttpRequest();
        request.open("GET", "https://jsonplaceholder.typicode.com/posts");
        request.responseType = "json";
        request.send();

        request.onload = function () {
            if (request.status === 200) {
                let posts = request.response;
                console.log(posts);
                let content = document.getElementById("content");
                for (post of posts) {
                    content.innerHTML += `<p>${post.title}${post.body}</p>`;
                }
            } else {
                console.error("Error fetching data");
            }
        };
    }
    function sendPost() {
        let request = new XMLHttpRequest();
        request.open("POST", "https://jsonplaceholder.typicode.com/posts");
        request.setRequestHeader("Content-Type", "application/json;charset=UTF-8");
        request.responseType = "json";
        request.send(JSON.stringify({
            title: "foo",
            body: "bar",
            userId: 1
        }));

        request.onload = function () {
            if (request.status === 201) {
                let newPost = request.response;
                console.log(newPost);
            } else {
                console.error("Error creating post");
            }
        };
    }
    function updatePost() {
        let request = new XMLHttpRequest();
        request.open("PUT", "https://jsonplaceholder.typicode.com/posts/1");
        request.setRequestHeader("Content-Type", "application/json;charset=UTF-8");
        request.responseType = "json";
        request.send(JSON.stringify({
            id: 1,
            title: "foo",
            body: "bar",
            userId: 1
        }));

        request.onload = function () {
            if (request.status === 200) {
                let updatedPost = request.response;
                console.log(updatedPost);
            } else {
                console.error("Error updating post");
            }
        };
    }
    function deletePost() {
        let request = new XMLHttpRequest();
        request.open("DELETE", "https://jsonplaceholder.typicode.com/posts/1");
        request.responseType = "json";
        request.send();

        request.onload = function () {
            if (request.status === 200) {
                console.log("Post deleted successfully");
            } else {
                console.error("Error deleting post");
            }

        };
    }
    function getPostsWithUserFilter() {
        let request = new XMLHttpRequest();
        request.open("GET", "https://jsonplaceholder.typicode.com/posts?userId=1");
